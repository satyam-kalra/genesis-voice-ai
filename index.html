<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Genesis Voice AI</title>
    <style>
        body { background: #0a0f1c; font-family: system-ui; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .phone { background: #11161f; border-radius: 48px; padding: 20px; width: 360px; text-align: center; }
        .screen { background: #000; border-radius: 32px; padding: 20px; height: 260px; overflow-y: auto; color: #0f0; font-family: monospace; text-align: left; margin-bottom: 20px; }
        .log-line { margin: 8px 0; border-left: 2px solid #0f0; padding-left: 10px; }
        .log-line.user { border-left-color: #88f; color: #ccf; }
        button { background: #2c3e4e; border: none; color: white; font-size: 1.2rem; padding: 12px 24px; border-radius: 40px; margin: 5px; cursor: pointer; }
        #call { background: #1e7e34; }
        #hangup { background: #9e2a2a; }
        button:disabled { opacity: 0.5; }
        .status { color: #aaa; margin-top: 15px; font-size: 13px; }
    </style>
</head>
<body>
<div class="phone">
    <div class="screen" id="logScreen"><div class="log-line">⚡ Genesis AI ready</div><div class="log-line">🎤 Click Call & speak</div></div>
    <button id="call">📞 Call</button>
    <button id="hangup" disabled>❌ Hang up</button>
    <div class="status" id="status">● Disconnected</div>
</div>
<script>
    const BACKEND_URL = 'const BACKEND_URL = 'https://humble-yodel-wgqvxx9wqrjfv99x-3000.preview.app.github.dev/ask'; // 
    let recognition = null, isListening = false;
    const logScreen = document.getElementById('logScreen'), statusDiv = document.getElementById('status');
    const callBtn = document.getElementById('call'), hangupBtn = document.getElementById('hangup');

    function addLog(text, isUser = false) {
        const div = document.createElement('div');
        div.className = `log-line ${isUser ? 'user' : ''}`;
        div.innerHTML = `${isUser ? '🗣️ You: ' : '🤖 AI: '}${text}`;
        logScreen.appendChild(div);
        div.scrollIntoView({ behavior: 'smooth' });
    }

    function speak(text) {
        return new Promise(resolve => {
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.onend = resolve;
            window.speechSynthesis.speak(utterance);
        });
    }

    async function callGemini(prompt) {
        const response = await fetch(BACKEND_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ prompt })
        });
        const data = await response.json();
        return data.reply || "Sorry, I didn't understand.";
    }

    async function startListening() {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        recognition = new SpeechRecognition();
        recognition.lang = 'en-US';
        recognition.onresult = async (event) => {
            const text = event.results[0][0].transcript;
            addLog(text, true);
            statusDiv.innerText = '● Thinking...';
            const reply = await callGemini(text);
            addLog(reply, false);
            statusDiv.innerText = '● Speaking...';
            await speak(reply);
            statusDiv.innerText = '● Connected – speak now';
            startListening();
        };
        recognition.onerror = () => { statusDiv.innerText = '● Error'; cleanup(); };
        recognition.start();
        isListening = true;
    }

    function cleanup() {
        if (recognition) recognition.stop();
        if (window.speechSynthesis) window.speechSynthesis.cancel();
        isListening = false;
        callBtn.disabled = false;
        hangupBtn.disabled = true;
        statusDiv.innerText = '● Disconnected';
    }

    async function startCall() {
        cleanup();
        try {
            await navigator.mediaDevices.getUserMedia({ audio: true });
            callBtn.disabled = true;
            hangupBtn.disabled = false;
            statusDiv.innerText = '● Connected – speak now';
            addLog('Call active. Speak into your microphone.', false);
            startListening();
        } catch (err) { addLog(`Microphone error: ${err.message}`, false); }
    }

    callBtn.onclick = startCall;
    hangupBtn.onclick = cleanup;
</script>
</body>
</html>
