<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Genesis Voice AI</title>
    <style>
        body { background: #0a0f1c; font-family: system-ui; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .phone { background: #11161f; border-radius: 48px; padding: 20px; width: 360px; text-align: center; }
        .screen { background: #000; border-radius: 32px; padding: 20px; height: 260px; overflow-y: auto; color: #0f0; font-family: monospace; text-align: left; margin-bottom: 20px; }
        .log-line { margin: 8px 0; border-left: 2px solid #0f0; padding-left: 10px; }
        .log-line.user { border-left-color: #88f; color: #ccf; }
        button { background: #2c3e4e; border: none; color: white; font-size: 1.2rem; padding: 12px 24px; border-radius: 40px; margin: 5px; cursor: pointer; }
        #call { background: #1e7e34; }
        #hangup { background: #9e2a2a; }
        button:disabled { opacity: 0.5; }
        .status { color: #aaa; margin-top: 15px; font-size: 13px; }
    </style>
</head>
<body>
<div class="phone">
    <div class="screen" id="logScreen"><div class="log-line">⚡ Genesis AI ready</div><div class="log-line">🎤 Click Call & speak</div></div>
    <button id="call">📞 Call</button>
    <button id="hangup" disabled>❌ Hang up</button>
    <div class="status" id="status">● Disconnected</div>
</div>

<script>
    // ✅ Replace with your Codespace public URL (from Ports tab) + '/ask'
    const BACKEND_URL = 'https://super-eureka-9jg6wwqpr76cpxxw-3000.app.github.dev/ask';

    let recognition = null;
    let isListening = false;
    let isSpeaking = false;

    const logScreen = document.getElementById('logScreen');
    const statusDiv = document.getElementById('status');
    const callBtn = document.getElementById('call');
    const hangupBtn = document.getElementById('hangup');

    function addLog(text, isUser = false) {
        const div = document.createElement('div');
        div.className = `log-line ${isUser ? 'user' : ''}`;
        div.innerHTML = `${isUser ? '🗣️ You: ' : '🤖 AI: '}${text}`;
        logScreen.appendChild(div);
        div.scrollIntoView({ behavior: 'smooth' });
    }

    function speak(text) {
        return new Promise((resolve) => {
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US';
            utterance.rate = 1.0;
            utterance.onend = resolve;
            window.speechSynthesis.speak(utterance);
        });
    }

    async function callProxy(prompt) {
        try {
            const response = await fetch(BACKEND_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ prompt })
            });
            const data = await response.json();
            return data.reply || "Sorry, I didn't understand.";
        } catch (err) {
            console.error(err);
            return "Error: Could not reach the server.";
        }
    }

    async function startListening() {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) {
            addLog("Browser does not support speech recognition. Use Chrome or Edge.", false);
            return;
        }
        recognition = new SpeechRecognition();
        recognition.lang = 'en-US';
        recognition.interimResults = false;

        recognition.onstart = () => {
            isListening = true;
            statusDiv.innerText = '● Listening...';
        };

        recognition.onresult = async (event) => {
            const transcript = event.results[0][0].transcript;
            addLog(transcript, true);
            statusDiv.innerText = '● Thinking...';
            recognition.stop();
            isListening = false;

            const reply = await callProxy(transcript);
            addLog(reply, false);
            statusDiv.innerText = '● Speaking...';
            await speak(reply);
            statusDiv.innerText = '● Connected – speak now';
            if (!isListening && !isSpeaking) startListening();
        };

        recognition.onerror = (e) => {
            console.error(e);
            addLog(`Error: ${e.error}`, false);
            statusDiv.innerText = '● Disconnected';
            cleanup();
        };
        recognition.start();
    }

    function cleanup() {
        if (recognition) recognition.stop();
        if (window.speechSynthesis) window.speechSynthesis.cancel();
        isListening = false;
        isSpeaking = false;
        callBtn.disabled = false;
        hangupBtn.disabled = true;
        statusDiv.innerText = '● Disconnected';
    }

    async function startCall() {
        cleanup();
        try {
            await navigator.mediaDevices.getUserMedia({ audio: true });
            callBtn.disabled = true;
            hangupBtn.disabled = false;
            statusDiv.innerText = '● Connected – speak now';
            addLog('Call active. Speak into your microphone.', false);
            await startListening();
        } catch (err) {
            addLog(`Microphone error: ${err.message}`, false);
        }
    }

    callBtn.addEventListener('click', startCall);
    hangupBtn.addEventListener('click', cleanup);
</script>
</body>
</html>
